<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoea - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{
          font-family: 'Inter', sans-serif;
        }
      </style>
</head>

<body class="bg-white min-h-screen flex justify-center fade-in">

    <!-- کانتینر اصلی موبایل -->
    <div class="w-full max-w-md min-h-screen flex flex-col px-6 py-1">

        <!-- دکمه بازگشت (Back) -->
        <button onclick="goBack()" class="text-black text-2xl mb-8 w-fit h-11 hover:scale-110 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </button>

        <!-- لوگو -->
        <div class="flex justify-center mb-24 mt-20">

            <img src="../images/logo.png" alt="Shoea" class="h-20 w-14 object-contain" />
        </div>

        <!-- عنوان -->
        <h1 class="text-3xl font-bold text-[32px] text-center text-gray-900 mb-10">Login to Your Account</h1>

        <!-- فرم ورودی -->
        <div class="flex flex-col gap-5">

            <!-- ایمیل -->
            <div id="emailWrapper"
                class="flex items-center bg-gray-50 border border-transparent rounded-2xl px-4 py-4 transition-all duration-300">
                <svg class="w-5 h-5 text-gray-400 mr-3" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                    <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                </svg>
                <input id="emailInput" type="email" placeholder="Email"
                    class="bg-transparent flex-1 outline-none text-sm font-medium text-gray-800 placeholder-gray-400" />
            </div>

            <!-- رمز عبور -->
            <div id="passwordWrapper"
                class="flex items-center bg-gray-50 border border-transparent rounded-2xl px-4 py-4 transition-all duration-300">
                <svg class="w-5 h-5 text-gray-400 mr-3" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                        clip-rule="evenodd" />
                </svg>
                <input id="passwordInput" type="password" placeholder="Password"
                    class="bg-transparent flex-1 outline-none text-sm font-medium text-gray-800 placeholder-gray-400" />
                <button onclick="togglePassword()" class=" focus:outline-none">
                    <svg id="eye-icon" class="w-5 h-5 text-gray-400"  fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49" />
                            <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
                            <path
                                d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143" />
                            <path d="m2 2 20 20" />
                        </svg>
                </button>
            </div>

            <!-- Remember me -->
            <div class="flex justify-center items-center gap-2 mt-9">
                <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded accent-black cursor-pointer" />
                <label for="rememberMe" class="text-sm font-semibold text-gray-700 cursor-pointer select-none">Remember
                    me</label>
            </div>

        </div>

        <!-- دکمه لاگین (Sign In) -->
        <div class="mt-auto mb-8 pt-8">
            <button id="signInBtn" disabled
                class="w-full bg-gray-400 text-white font-bold py-4 rounded-full shadow-lg transition-all duration-300 active:scale-95 disabled:cursor-not-allowed">
                Sign In
            </button>
        </div>

    </div>
    <script src="../script/login.js"></script>
</body>

</html>
